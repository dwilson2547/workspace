; PlatformIO wrapper so we can build / flash / monitor the existing Arduino sketch
; from the CLI. The sketch itself still lives in esp32_s3_media_remote/ and remains
; editable from the Arduino IDE.
[platformio]
; The .ino lives here; PlatformIO will compile it as the program source.
src_dir = esp32_s3_media_remote

[env:seeed_xiao_esp32s3]
platform = espressif32
board = seeed_xiao_esp32s3
framework = arduino

monitor_speed = 115200
monitor_port = /dev/ttyACM0
upload_port = /dev/ttyACM0

; The core's bundled BLE (Kolban) wrapper drops duplicate-UUID characteristics in
; NimBLE mode, which breaks composite HID (keyboard + consumer share UUID 0x2a4d).
; NimBLE-Arduino's NimBLEHIDDevice registers multiple report characteristics correctly.
lib_deps = h2zero/NimBLE-Arduino@^2.2.3

; Decode panic backtraces automatically in the monitor.
monitor_filters = esp32_exception_decoder, time
build_type = debug
