<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Livox Scan Viewer</title>
    <style>
      :root {
        color-scheme: dark;
      }
      body {
        margin: 0;
        overflow: hidden;
        background: #11161c;
        font-family: system-ui, sans-serif;
      }
      #overlay {
        position: fixed;
        top: 12px;
        left: 12px;
        z-index: 10;
        max-width: 420px;
        padding: 10px 12px;
        border-radius: 8px;
        background: rgba(17, 22, 28, 0.86);
        color: #e8edf2;
        line-height: 1.4;
      }
      #title {
        font-weight: 700;
      }
      #status {
        margin-top: 6px;
        color: #b9c5d1;
        white-space: pre-wrap;
        word-break: break-word;
      }
      canvas {
        display: block;
      }
    </style>
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.161.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.161.0/examples/jsm/"
        }
      }
    </script>
  </head>
  <body>
    <div id="overlay">
      <div id="title">Livox scan viewer</div>
      <div id="status">Loading staged scan...</div>
    </div>
    <script type="module">
      import * as THREE from "three";
      import { OrbitControls } from "three/addons/controls/OrbitControls.js";
      import { PLYLoader } from "three/addons/loaders/PLYLoader.js";

      const statusEl = document.getElementById("status");

      const renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setPixelRatio(window.devicePixelRatio);
      renderer.setSize(window.innerWidth, window.innerHeight);
      document.body.appendChild(renderer.domElement);

      const scene = new THREE.Scene();
      scene.background = new THREE.Color(0x11161c);

      const camera = new THREE.PerspectiveCamera(
        60,
        window.innerWidth / window.innerHeight,
        0.01,
        1000
      );
      camera.position.set(1.5, 1.2, 1.5);

      const controls = new OrbitControls(camera, renderer.domElement);
      controls.enableDamping = true;
      controls.target.set(0, 0, 0);

      const hemi = new THREE.HemisphereLight(0xe6f0ff, 0x202833, 1.1);
      scene.add(hemi);
      const dir = new THREE.DirectionalLight(0xffffff, 1.2);
      dir.position.set(4, 6, 5);
      scene.add(dir);

      scene.add(new THREE.GridHelper(4, 40, 0x3f4d60, 0x2a3442));
      scene.add(new THREE.AxesHelper(0.4));

      function fitCameraToObject(object) {
        const box = new THREE.Box3().setFromObject(object);
        const size = box.getSize(new THREE.Vector3());
        const center = box.getCenter(new THREE.Vector3());
        const maxDim = Math.max(size.x, size.y, size.z);
        const distance = Math.max(maxDim * 1.8, 1.0);
        controls.target.copy(center);
        camera.position.copy(center.clone().add(new THREE.Vector3(distance, distance * 0.7, distance)));
        camera.near = Math.max(maxDim / 1000, 0.01);
        camera.far = Math.max(maxDim * 20, 1000);
        camera.updateProjectionMatrix();
        controls.update();
      }

      async function loadStagedScan() {
        const metaRes = await fetch("./runtime/current_scan.json");
        if (!metaRes.ok) {
          throw new Error("No staged scan metadata found.");
        }
        const meta = await metaRes.json();

        const loader = new PLYLoader();
        loader.load(
          `./runtime/${meta.asset}`,
          (geometry) => {
            geometry.computeVertexNormals();
            geometry.center();

            const hasFaces = geometry.index !== null;
            let object;
            if (hasFaces) {
              const material = new THREE.MeshStandardMaterial({
                color: 0x9db0c6,
                metalness: 0.08,
                roughness: 0.82,
                side: THREE.DoubleSide,
              });
              object = new THREE.Mesh(geometry, material);
            } else {
              const material = new THREE.PointsMaterial({
                color: 0x9dd6ff,
                size: 0.01,
              });
              object = new THREE.Points(geometry, material);
            }

            scene.add(object);
            fitCameraToObject(object);

            const vertexCount = geometry.getAttribute("position")?.count ?? 0;
            const faceCount = geometry.index ? geometry.index.count / 3 : 0;
            statusEl.textContent =
              `Source: ${meta.source}\n` +
              `Size: ${(meta.size_bytes / (1024 * 1024)).toFixed(2)} MiB\n` +
              `Vertices: ${vertexCount}\n` +
              (hasFaces ? `Faces: ${faceCount}\n` : "Faces: n/a (point cloud)\n") +
              `Mode: ${hasFaces ? "mesh" : "points"}`;
          },
          undefined,
          (error) => {
            statusEl.textContent = `Failed to load scan: ${error.message ?? error}`;
          }
        );
      }

      function animate() {
        requestAnimationFrame(animate);
        controls.update();
        renderer.render(scene, camera);
      }

      window.addEventListener("resize", () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      });

      loadStagedScan().catch((error) => {
        statusEl.textContent = `Failed to load scan: ${error.message ?? error}`;
      });
      animate();
    </script>
  </body>
</html>
