<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Scanner Control</title>
    <style>
      :root { color-scheme: dark; }
      body {
        margin: 0;
        font-family: system-ui, sans-serif;
        background: #10161d;
        color: #e9eef4;
      }
      header {
        padding: 16px 20px;
        border-bottom: 1px solid #293240;
      }
      main {
        display: grid;
        grid-template-columns: 360px 1fr;
        gap: 16px;
        padding: 16px;
      }
      .panel {
        background: #161e27;
        border: 1px solid #293240;
        border-radius: 10px;
        padding: 14px;
      }
      h1, h2 { margin: 0 0 10px 0; }
      h2 { font-size: 1rem; }
      .actions { display: flex; gap: 10px; margin-bottom: 10px; }
      .viewer-actions { display: flex; gap: 10px; margin-bottom: 10px; }
      button {
        border: 0;
        border-radius: 8px;
        padding: 10px 14px;
        font-weight: 600;
        cursor: pointer;
      }
      button.start { background: #2d8f5a; color: white; }
      button.stop { background: #b44a4a; color: white; }
      button:disabled { opacity: 0.5; cursor: default; }
      .status-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }
      .metric {
        background: #0f141b;
        border-radius: 8px;
        padding: 10px;
      }
      .metric label {
        display: block;
        color: #9fb0c1;
        font-size: 0.78rem;
        margin-bottom: 4px;
      }
      .metric .value {
        font-size: 1rem;
        font-weight: 600;
      }
      #camera {
        width: 100%;
        aspect-ratio: 4 / 3;
        object-fit: contain;
        background: #0b1015;
        border-radius: 8px;
      }
      #meshCanvas {
        width: 100%;
        height: 720px;
        display: block;
        border-radius: 8px;
        background: #0b1015;
      }
      .mono {
        font-family: ui-monospace, monospace;
        word-break: break-all;
      }
    </style>
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.161.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.161.0/examples/jsm/"
        }
      }
    </script>
  </head>
  <body>
    <header>
      <h1>Handheld scanner control</h1>
    </header>
    <main>
      <section class="panel">
        <h2>Scan control</h2>
        <div class="actions">
          <button class="start" id="startBtn">Start scan</button>
          <button class="stop" id="stopBtn">Stop scan</button>
        </div>
        <div class="metric" style="margin-bottom: 12px;">
          <label>Last session</label>
          <div class="value mono" id="lastSession">n/a</div>
        </div>

        <h2>Live camera</h2>
        <img id="camera" alt="Live camera preview" />

        <h2 style="margin-top: 16px;">System status</h2>
        <div class="status-grid">
          <div class="metric"><label>Scanner</label><div class="value" id="scannerState">idle</div></div>
          <div class="metric"><label>Health</label><div class="value" id="health">n/a</div></div>
          <div class="metric"><label>LiDAR rate</label><div class="value" id="lidarRate">0 Hz</div></div>
          <div class="metric"><label>IMU rate</label><div class="value" id="imuRate">0 Hz</div></div>
          <div class="metric"><label>Camera rate</label><div class="value" id="cameraRate">0 Hz</div></div>
          <div class="metric"><label>Mesh triangles</label><div class="value" id="meshTriangles">0</div></div>
          <div class="metric"><label>Preview points</label><div class="value" id="meshPoints">0</div></div>
          <div class="metric"><label>Odom position</label><div class="value" id="odomPos">n/a</div></div>
        </div>
      </section>

      <section class="panel">
        <h2>Live LiDAR / mesh preview</h2>
        <div class="viewer-actions">
          <button id="resetViewBtn">Reset view</button>
        </div>
        <canvas id="meshCanvas"></canvas>
      </section>
    </main>

    <script type="module">
      import * as THREE from "three";
      import { OrbitControls } from "three/addons/controls/OrbitControls.js";

      const startBtn = document.getElementById("startBtn");
      const stopBtn = document.getElementById("stopBtn");
      const resetViewBtn = document.getElementById("resetViewBtn");
      const cameraEl = document.getElementById("camera");

      const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById("meshCanvas"), antialias: true });
      renderer.setPixelRatio(window.devicePixelRatio);
      renderer.setSize(renderer.domElement.clientWidth, renderer.domElement.clientHeight, false);

      const scene = new THREE.Scene();
      scene.background = new THREE.Color(0x0b1015);
      const camera = new THREE.PerspectiveCamera(60, renderer.domElement.clientWidth / renderer.domElement.clientHeight, 0.01, 1000);
      camera.position.set(2.2, 1.5, 2.2);

      const controls = new OrbitControls(camera, renderer.domElement);
      controls.enableDamping = true;
      scene.add(new THREE.GridHelper(6, 60, 0x415066, 0x293240));
      scene.add(new THREE.AxesHelper(0.4));
      scene.add(new THREE.HemisphereLight(0xe8f0ff, 0x1a2028, 1.0));

      let livePoints = new THREE.Points(
        new THREE.BufferGeometry(),
        new THREE.PointsMaterial({ color: 0x9fd4ff, size: 0.02 })
      );
      scene.add(livePoints);
      let hasAutoFramed = false;

      function resizeRenderer() {
        const canvas = renderer.domElement;
        const width = canvas.clientWidth;
        const height = canvas.clientHeight;
        if (canvas.width !== width || canvas.height !== height) {
          renderer.setSize(width, height, false);
          camera.aspect = width / height;
          camera.updateProjectionMatrix();
        }
      }

      function fitToPoints(points) {
        if (!points.length) return;
        const box = new THREE.Box3();
        for (const [x, y, z] of points) {
          box.expandByPoint(new THREE.Vector3(x, y, z));
        }
        const size = box.getSize(new THREE.Vector3());
        const center = box.getCenter(new THREE.Vector3());
        const maxDim = Math.max(size.x, size.y, size.z, 1.0);
        controls.target.copy(center);
        camera.position.copy(center.clone().add(new THREE.Vector3(maxDim, maxDim * 0.7, maxDim)));
        controls.update();
      }

      function rosFluToViewer([x, y, z]) {
        return [x, z, -y];
      }

      async function postJson(path) {
        const response = await fetch(path, { method: "POST" });
        if (!response.ok) throw new Error(await response.text());
        return response.json();
      }

      async function refreshStatus() {
        const response = await fetch("/api/status");
        const status = await response.json();

        document.getElementById("scannerState").textContent = status.scanner_running ? "running" : "idle";
        document.getElementById("health").textContent = status.health === null ? "n/a" : status.health.toFixed(2);
        document.getElementById("lidarRate").textContent = `${status.lidar.rate_hz.toFixed(1)} Hz`;
        document.getElementById("imuRate").textContent = `${status.imu.rate_hz.toFixed(1)} Hz`;
        document.getElementById("cameraRate").textContent = `${status.camera.rate_hz.toFixed(1)} Hz`;
        document.getElementById("meshTriangles").textContent = status.mesh.triangle_count;
        document.getElementById("meshPoints").textContent = status.mesh.preview_point_count;
        document.getElementById("lastSession").textContent = status.last_session_dir ?? "n/a";
        document.getElementById("odomPos").textContent = status.odom.position
          ? status.odom.position.map(v => v.toFixed(2)).join(", ")
          : "n/a";

        startBtn.disabled = status.scanner_running;
        stopBtn.disabled = !status.scanner_running;

        if (status.camera.available) {
          cameraEl.src = `/api/camera.bmp?ts=${Date.now()}`;
        }
      }

      async function refreshMesh() {
        const response = await fetch("/api/mesh");
        const mesh = await response.json();
        const points = (mesh.points ?? []).map(rosFluToViewer);
        const flat = new Float32Array(points.flat());
        const geometry = new THREE.BufferGeometry();
        geometry.setAttribute("position", new THREE.BufferAttribute(flat, 3));
        livePoints.geometry.dispose();
        livePoints.geometry = geometry;
        if (points.length && !hasAutoFramed) {
          fitToPoints(points);
          hasAutoFramed = true;
        }
      }

      startBtn.addEventListener("click", async () => {
        await postJson("/api/scan/start");
        await refreshStatus();
      });

      stopBtn.addEventListener("click", async () => {
        await postJson("/api/scan/stop");
        await refreshStatus();
      });

      resetViewBtn.addEventListener("click", async () => {
        const response = await fetch("/api/mesh");
        const mesh = await response.json();
        const points = (mesh.points ?? []).map(rosFluToViewer);
        fitToPoints(points);
      });

      setInterval(refreshStatus, 1000);
      setInterval(refreshMesh, 1500);

      function animate() {
        requestAnimationFrame(animate);
        resizeRenderer();
        controls.update();
        renderer.render(scene, camera);
      }

      refreshStatus();
      refreshMesh();
      animate();
    </script>
  </body>
</html>
