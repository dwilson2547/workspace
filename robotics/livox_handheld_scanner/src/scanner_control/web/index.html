<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Scanner Control</title>
    <style>
      :root { color-scheme: dark; }
      body {
        margin: 0;
        font-family: system-ui, sans-serif;
        background: #10161d;
        color: #e9eef4;
      }
      header {
        padding: 16px 20px;
        border-bottom: 1px solid #293240;
      }
      main {
        display: grid;
        grid-template-columns: 380px 1fr;
        gap: 16px;
        padding: 16px;
      }
      .panel {
        background: #161e27;
        border: 1px solid #293240;
        border-radius: 10px;
        padding: 14px;
      }
      .stack {
        display: grid;
        gap: 16px;
      }
      h1, h2 {
        margin: 0 0 10px 0;
      }
      h2 {
        font-size: 1rem;
      }
      .actions {
        display: flex;
        gap: 10px;
        margin-bottom: 10px;
        flex-wrap: wrap;
      }
      button {
        border: 0;
        border-radius: 8px;
        padding: 10px 14px;
        font-weight: 600;
        cursor: pointer;
      }
      button.start { background: #2d8f5a; color: white; }
      button.stop { background: #b44a4a; color: white; }
      button.process { background: #3f6db3; color: white; }
      button:disabled { opacity: 0.5; cursor: default; }
      .status-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }
      .metric, .capture {
        background: #0f141b;
        border-radius: 8px;
        padding: 10px;
      }
      .metric label {
        display: block;
        color: #9fb0c1;
        font-size: 0.78rem;
        margin-bottom: 4px;
      }
      .metric .value {
        font-size: 1rem;
        font-weight: 600;
      }
      #camera {
        width: 100%;
        aspect-ratio: 4 / 3;
        object-fit: contain;
        background: #0b1015;
        border-radius: 8px;
      }
      #meshCanvas {
        width: 100%;
        height: 720px;
        display: block;
        border-radius: 8px;
        background: #0b1015;
      }
      .mono {
        font-family: ui-monospace, monospace;
        word-break: break-all;
      }
      .subtle {
        color: #9fb0c1;
        font-size: 0.86rem;
      }
      .notice {
        margin: 0 0 10px 0;
        padding: 10px 12px;
        border-radius: 8px;
        background: #0f141b;
        color: #d7e1eb;
        font-size: 0.9rem;
      }
      .notice.error {
        background: #35181b;
        color: #ffccd2;
      }
      .captures {
        display: grid;
        gap: 8px;
        max-height: 300px;
        overflow: auto;
      }
      .capture-head {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 10px;
        margin-bottom: 6px;
      }
      .capture-meta {
        color: #9fb0c1;
        font-size: 0.82rem;
        line-height: 1.4;
      }
      .capture-actions {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }
      .capture-note {
        margin-top: 6px;
        color: #d8b46a;
        font-size: 0.8rem;
      }
      .viewer-toolbar {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        margin-bottom: 10px;
      }
      .viewer-toolbar button {
        background: #263345;
        color: white;
      }
      #viewerState {
        margin-bottom: 10px;
      }
      @media (max-width: 1100px) {
        main {
          grid-template-columns: 1fr;
        }
        #meshCanvas {
          height: 520px;
        }
      }
    </style>
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.161.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.161.0/examples/jsm/"
        }
      }
    </script>
  </head>
  <body>
    <header>
      <h1>Handheld scanner control</h1>
    </header>
    <main>
      <section class="panel">
        <div class="stack">
          <div>
            <h2>Scan control</h2>
            <div style="margin-bottom:10px;">
              <label class="subtle" style="display:block;margin-bottom:4px;">Session name (optional)</label>
              <input type="text" id="sessionNameInput" placeholder="e.g. living-room" maxlength="60"
                     style="width:100%;box-sizing:border-box;background:#0f141b;border:1px solid #293240;border-radius:6px;padding:8px 10px;color:#e9eef4;font-size:0.9rem;" />
            </div>
            <div class="actions">
              <button class="start" id="startBtn">Start scan</button>
              <button class="stop" id="stopBtn">Stop scan</button>
            </div>
            <div class="metric">
              <label>Last session</label>
              <div class="value mono" id="lastSession">n/a</div>
            </div>
          </div>

          <div>
            <h2>Live camera</h2>
            <img id="camera" alt="Live camera preview" />
            <div class="subtle" id="cameraState" style="margin-top: 8px;">camera unavailable</div>
          </div>

          <div>
            <h2>System status</h2>
            <div class="status-grid">
              <div class="metric"><label>Scanner</label><div class="value" id="scannerState">idle</div></div>
              <div class="metric"><label>Health</label><div class="value" id="health">n/a</div></div>
              <div class="metric"><label>LiDAR rate</label><div class="value" id="lidarRate">0 Hz</div></div>
              <div class="metric"><label>IMU rate</label><div class="value" id="imuRate">0 Hz</div></div>
              <div class="metric"><label>Camera rate</label><div class="value" id="cameraRate">0 Hz</div></div>
              <div class="metric"><label>Mesh triangles</label><div class="value" id="meshTriangles">0</div></div>
              <div class="metric"><label>Preview points</label><div class="value" id="meshPoints">0</div></div>
              <div class="metric"><label>Odom position</label><div class="value" id="odomPos">n/a</div></div>
            </div>
          </div>

          <div>
            <h2>Previous captures</h2>
            <div class="subtle" id="processingState" style="margin-bottom: 8px;">processing: idle</div>
            <div class="captures" id="captures"></div>
          </div>
        </div>
      </section>

      <section class="panel">
        <h2>Preview / processed result</h2>
        <div class="notice" id="messageBar">Ready.</div>
        <div class="viewer-toolbar">
          <button id="liveViewBtn">Live preview</button>
          <button id="processedViewBtn" disabled>Processed mesh</button>
        </div>
        <div class="subtle" id="viewerState">viewer: live preview</div>
        <canvas id="meshCanvas"></canvas>
      </section>
    </main>

    <script type="module">
      import * as THREE from "three";
      import { OrbitControls } from "three/addons/controls/OrbitControls.js";
      import { PLYLoader } from "three/addons/loaders/PLYLoader.js";

      const startBtn = document.getElementById("startBtn");
      const stopBtn = document.getElementById("stopBtn");
      const liveViewBtn = document.getElementById("liveViewBtn");
      const processedViewBtn = document.getElementById("processedViewBtn");
      const cameraEl = document.getElementById("camera");
      const cameraStateEl = document.getElementById("cameraState");
      const processingStateEl = document.getElementById("processingState");
      const capturesEl = document.getElementById("captures");
      const viewerStateEl = document.getElementById("viewerState");
      const messageBarEl = document.getElementById("messageBar");

      let cameraObjectUrl = null;
      let cameraFetchInFlight = false;
      let latestStatus = null;
      let latestCapturesPayload = null;
      let viewerMode = "live";
      let processedObject = null;
      let selectedCapturePath = null;
      let livePreviewFitted = false;
      let latestPreviewPointCount = 0;

      const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById("meshCanvas"), antialias: true });
      renderer.setPixelRatio(window.devicePixelRatio);
      renderer.setSize(renderer.domElement.clientWidth, renderer.domElement.clientHeight, false);

      const scene = new THREE.Scene();
      scene.background = new THREE.Color(0x0b1015);
      const camera = new THREE.PerspectiveCamera(60, renderer.domElement.clientWidth / renderer.domElement.clientHeight, 0.01, 1000);
      camera.position.set(2.2, 1.5, 2.2);

      const controls = new OrbitControls(camera, renderer.domElement);
      controls.enableDamping = true;
      scene.add(new THREE.GridHelper(6, 60, 0x415066, 0x293240));
      scene.add(new THREE.AxesHelper(0.4));
      scene.add(new THREE.HemisphereLight(0xe8f0ff, 0x1a2028, 1.0));
      const plyLoader = new PLYLoader();

      const livePoints = new THREE.Points(
        new THREE.BufferGeometry(),
        new THREE.PointsMaterial({ color: 0x9fd4ff, size: 0.02 })
      );
      scene.add(livePoints);

      function setMessage(text, kind = "info") {
        messageBarEl.textContent = text;
        messageBarEl.className = kind === "error" ? "notice error" : "notice";
      }

      function resizeRenderer() {
        const canvas = renderer.domElement;
        const width = canvas.clientWidth;
        const height = canvas.clientHeight;
        if (canvas.width !== width || canvas.height !== height) {
          renderer.setSize(width, height, false);
          camera.aspect = width / height;
          camera.updateProjectionMatrix();
        }
      }

      // Returns the mean position of all vertices — robust center for meshes with outlier clusters.
      function vertexCentroid(geometry) {
        const pos = geometry.getAttribute("position");
        let cx = 0, cy = 0, cz = 0;
        for (let i = 0; i < pos.count; i++) {
          cx += pos.getX(i); cy += pos.getY(i); cz += pos.getZ(i);
        }
        const n = pos.count;
        return new THREE.Vector3(cx / n, cy / n, cz / n);
      }

      // Returns the 90th-percentile distance from the centroid — gives a camera distance
      // that ignores outlier clusters without needing to know cluster membership.
      function robustExtent(geometry, centroid) {
        const pos = geometry.getAttribute("position");
        const dists = new Float32Array(pos.count);
        for (let i = 0; i < pos.count; i++) {
          const dx = pos.getX(i) - centroid.x;
          const dy = pos.getY(i) - centroid.y;
          const dz = pos.getZ(i) - centroid.z;
          dists[i] = Math.sqrt(dx*dx + dy*dy + dz*dz);
        }
        dists.sort();
        return dists[Math.floor(dists.length * 0.90)] * 2.0;
      }

      function fitToGeometry(geometry) {
        const posAttr = geometry.getAttribute("position");
        if (!posAttr || posAttr.count === 0) {
          setMessage("Mesh loaded but contains no geometry.", "error");
          return;
        }
        const box = new THREE.Box3().setFromBufferAttribute(posAttr);
        const bboxExtent = box.getSize(new THREE.Vector3());
        const maxDim = Math.max(bboxExtent.x, bboxExtent.y, bboxExtent.z, 1.0);
        if (maxDim > 5000) {
          setMessage(`Mesh has unrealistic extents (${maxDim.toFixed(0)} m) — likely corrupted. Re-process this session.`, "error");
          return;
        }
        const center = vertexCentroid(geometry);
        const extent = Math.max(robustExtent(geometry, center), 1.0);
        controls.target.copy(center);
        camera.position.copy(center.clone().add(new THREE.Vector3(extent, extent * 0.7, extent)));
        controls.update();
      }

      function setViewerMode(mode) {
        viewerMode = mode;
        const processedVisible = mode === "processed";
        livePoints.visible = !processedVisible;
        if (processedObject) {
          processedObject.visible = processedVisible;
        }
        liveViewBtn.disabled = mode === "live";
        processedViewBtn.disabled = mode === "processed" || !selectedCapturePath;
        if (mode === "live") {
          viewerStateEl.textContent = "viewer: live preview";
        } else if (selectedCapturePath) {
          viewerStateEl.textContent = `viewer: processed mesh for ${selectedCapturePath.split("/").pop()}`;
        } else {
          viewerStateEl.textContent = "viewer: processed mesh";
        }
      }

      async function postJson(path, body = {}) {
        const response = await fetch(path, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(body),
        });
        if (!response.ok) {
          let message = await response.text();
          try {
            const payload = JSON.parse(message);
            if (payload.message) {
              message = payload.message;
            }
          } catch (_) {
            // keep raw response text when the backend returned a plain error page
          }
          throw new Error(message);
        }
        return response.json();
      }

      async function refreshStatus() {
        const response = await fetch("/api/status");
        const status = await response.json();
        latestStatus = status;

        document.getElementById("scannerState").textContent = status.scanner_running ? "running" : "idle";
        document.getElementById("health").textContent = status.health === null ? "n/a" : status.health.toFixed(2);
        document.getElementById("lidarRate").textContent = `${status.lidar.rate_hz.toFixed(1)} Hz`;
        document.getElementById("imuRate").textContent = `${status.imu.rate_hz.toFixed(1)} Hz`;
        document.getElementById("cameraRate").textContent = `${status.camera.rate_hz.toFixed(1)} Hz`;
        document.getElementById("meshTriangles").textContent = status.mesh.triangle_count;
        document.getElementById("meshPoints").textContent = latestPreviewPointCount.toLocaleString();
        document.getElementById("lastSession").textContent = status.last_session_dir ?? "n/a";
        document.getElementById("odomPos").textContent = status.odom.position
          ? status.odom.position.map((v) => v.toFixed(2)).join(", ")
          : "n/a";

        processingStateEl.textContent = status.processing.message
          ? `${status.processing.status}: ${status.processing.message}`
          : `processing: ${status.processing.status}`;

        startBtn.disabled = status.scanner_running;
        stopBtn.disabled = !status.scanner_running;
        cameraStateEl.textContent = status.camera.available
          ? `camera ${status.camera.rate_hz.toFixed(1)} Hz`
          : "camera unavailable";
      }

      async function refreshPreview() {
        if (viewerMode !== "live") return;
        const response = await fetch(`/api/preview.bin?ts=${Date.now()}`);
        if (response.status === 204 || !response.ok) return;
        const buffer = await response.arrayBuffer();
        if (!buffer.byteLength) return;
        const floats = new Float32Array(buffer);
        // ROS uses Z-up; ThreeJS uses Y-up — transform (x,y,z) → (x,z,-y)
        for (let i = 0; i < floats.length; i += 3) {
          const y = floats[i + 1], z = floats[i + 2];
          floats[i + 1] = z;
          floats[i + 2] = -y;
        }
        const geometry = new THREE.BufferGeometry();
        geometry.setAttribute("position", new THREE.BufferAttribute(floats, 3));
        livePoints.geometry.dispose();
        livePoints.geometry = geometry;
        latestPreviewPointCount = floats.length / 3;
        if (floats.length > 0 && !livePreviewFitted) {
          fitToGeometry(geometry);
          livePreviewFitted = true;
        }
        if (floats.length === 0) {
          latestPreviewPointCount = 0;
          livePreviewFitted = false;
        }
      }

      async function loadProcessedMesh(capture, colored = false) {
        if (colored && !capture.colored_mesh) {
          throw new Error("no colored mesh yet — run colorization first");
        }
        if (!colored && !capture.processed_mesh) {
          throw new Error("this capture has no processed mesh yet");
        }
        const url = `/api/capture/mesh?capture_dir=${encodeURIComponent(capture.path)}&colored=${colored ? 1 : 0}&ts=${Date.now()}`;
        setMessage(`Loading mesh for ${capture.name}…`);
        const geometry = await new Promise((resolve, reject) => {
          plyLoader.load(
            url,
            resolve,
            (xhr) => {
              if (xhr.total > 0) {
                const pct = Math.round(xhr.loaded / xhr.total * 100);
                setMessage(`Loading mesh for ${capture.name}… ${pct}%`);
              }
            },
            reject,
          );
        });

        geometry.computeVertexNormals();
        // ROS uses Z-up; ThreeJS uses Y-up — rotate -90° around X to correct
        geometry.applyMatrix4(new THREE.Matrix4().makeRotationX(-Math.PI / 2));
        // Center on vertex centroid rather than bbox midpoint so outlier clusters
        // don't drag the view away from the main geometry.
        const c = vertexCentroid(geometry);
        geometry.translate(-c.x, -c.y, -c.z);

        if (processedObject) {
          scene.remove(processedObject);
          if (processedObject.geometry) {
            processedObject.geometry.dispose();
          }
          if (processedObject.material) {
            processedObject.material.dispose();
          }
        }

        const hasFaces = geometry.index !== null;
        const hasVertexColors = !!geometry.getAttribute("color");
        if (hasFaces) {
          processedObject = new THREE.Mesh(
            geometry,
            new THREE.MeshStandardMaterial({
              color: hasVertexColors ? 0xffffff : 0x9db0c6,
              vertexColors: hasVertexColors,
              metalness: hasVertexColors ? 0.0 : 0.08,
              roughness: hasVertexColors ? 0.9 : 0.82,
              side: THREE.DoubleSide,
            })
          );
        } else {
          processedObject = new THREE.Points(
            geometry,
            new THREE.PointsMaterial({
              color: hasVertexColors ? 0xffffff : 0x9dd6ff,
              vertexColors: hasVertexColors,
              size: 0.01,
            })
          );
        }

        scene.add(processedObject);
        fitToGeometry(geometry);

        selectedCapturePath = capture.path;
        processedViewBtn.disabled = false;
        setViewerMode("processed");

        const vertexCount = geometry.getAttribute("position")?.count ?? 0;
        const faceCount = geometry.index ? geometry.index.count / 3 : 0;
        setMessage(
          hasFaces
            ? `Loaded processed mesh for ${capture.name}: ${vertexCount} vertices, ${faceCount} faces.`
            : `Loaded processed point cloud for ${capture.name}: ${vertexCount} points.`
        );
      }

      async function refreshCamera() {
        if (cameraFetchInFlight) return;
        if (!latestStatus?.camera?.available) return;
        cameraFetchInFlight = true;
        try {
          const response = await fetch(`/api/camera.bmp?ts=${Date.now()}`, { cache: "no-store" });
          if (!response.ok) {
            cameraStateEl.textContent = "camera unavailable";
            return;
          }
          const blob = await response.blob();
          const nextUrl = URL.createObjectURL(blob);
          cameraEl.src = nextUrl;
          if (cameraObjectUrl) {
            URL.revokeObjectURL(cameraObjectUrl);
          }
          cameraObjectUrl = nextUrl;
        } finally {
          cameraFetchInFlight = false;
        }
      }

      function formatBytes(bytes) {
        if (!bytes) return "0 B";
        const units = ["B", "KiB", "MiB", "GiB"];
        let value = bytes;
        let unit = 0;
        while (value >= 1024 && unit < units.length - 1) {
          value /= 1024;
          unit += 1;
        }
        return `${value.toFixed(unit === 0 ? 0 : 1)} ${units[unit]}`;
      }

      async function refreshCaptures() {
        const response = await fetch("/api/captures");
        const payload = await response.json();
        latestCapturesPayload = payload;
        capturesEl.innerHTML = "";
        for (const capture of payload.captures) {
          const card = document.createElement("div");
          card.className = "capture";

          const head = document.createElement("div");
          head.className = "capture-head";

          const title = document.createElement("div");
          title.innerHTML = `<strong>${capture.name}</strong>`;
          head.appendChild(title);

          const actionWrap = document.createElement("div");
          actionWrap.className = "capture-actions";

          const processBtn = document.createElement("button");
          processBtn.className = "process";
          processBtn.textContent = payload.processing.capture_dir === capture.path && payload.processing.status === "running"
            ? "Processing..."
            : "Run full processing";
          processBtn.disabled = payload.processing.status === "running" || !capture.processable;
          processBtn.addEventListener("click", async () => {
            try {
              const result = await postJson("/api/process/start", { capture_dir: capture.path });
              setMessage(result.message);
              await refreshStatus();
              await refreshCaptures();
            } catch (error) {
              setMessage(error.message ?? String(error), "error");
            }
          });
          actionWrap.appendChild(processBtn);

          if (capture.processed_mesh) {
            const viewBtn = document.createElement("button");
            viewBtn.textContent = "View mesh";
            viewBtn.addEventListener("click", async () => {
              try {
                await loadProcessedMesh(capture, false);
              } catch (error) {
                setMessage(error.message ?? String(error), "error");
              }
            });
            actionWrap.appendChild(viewBtn);

            // Colorize button: available once there's a processed mesh
            const colorizeBtn = document.createElement("button");
            colorizeBtn.textContent = capture.colored_mesh ? "Re-colorize" : "Colorize";
            colorizeBtn.style.cssText = "background:#1a3a2a;color:#7fffd4;";
            colorizeBtn.addEventListener("click", async () => {
              try {
                colorizeBtn.disabled = true;
                colorizeBtn.textContent = "Colorizing…";
                const result = await postJson("/api/capture/colorize", { capture_dir: capture.path });
                setMessage(result.message);
                // Poll until done
                const poll = setInterval(async () => {
                  const s = await fetch("/api/captures").then(r => r.json());
                  const col = s.colorize;
                  if (col && col.capture_dir === capture.path) {
                    if (col.status === "completed" || col.status === "failed") {
                      clearInterval(poll);
                      colorizeBtn.disabled = false;
                      setMessage(col.message, col.status === "failed" ? "error" : undefined);
                      await refreshCaptures();
                    }
                  }
                }, 2000);
              } catch (error) {
                colorizeBtn.disabled = false;
                colorizeBtn.textContent = "Colorize";
                setMessage(error.message ?? String(error), "error");
              }
            });
            actionWrap.appendChild(colorizeBtn);
          }

          if (capture.colored_mesh) {
            const viewColorBtn = document.createElement("button");
            viewColorBtn.textContent = "View colored";
            viewColorBtn.style.cssText = "background:#1a2a1a;color:#b8ffb8;";
            viewColorBtn.addEventListener("click", async () => {
              try {
                await loadProcessedMesh(capture, true);
              } catch (error) {
                setMessage(error.message ?? String(error), "error");
              }
            });
            actionWrap.appendChild(viewColorBtn);
          }

          if (capture.has_pointcloud) {
            const potreeRunning = payload.potree && payload.potree.running &&
              payload.potree.session_dir === capture.path;
            const potreeBtn = document.createElement("button");
            potreeBtn.style.cssText = "background:#1a2a3a;color:#7fd4ff;";
            if (potreeRunning) {
              potreeBtn.textContent = "Open Potree ↗";
              potreeBtn.addEventListener("click", () => {
                window.open(payload.potree.url, "_blank", "noopener");
              });
              actionWrap.appendChild(potreeBtn);
              const stopPotreeBtn = document.createElement("button");
              stopPotreeBtn.textContent = "Stop Potree";
              stopPotreeBtn.style.cssText = "background:#3a1a1a;color:#ffaaaa;";
              stopPotreeBtn.addEventListener("click", async () => {
                try {
                  await postJson("/api/potree/stop", {});
                  await refreshCaptures();
                } catch (error) {
                  setMessage(error.message ?? String(error), "error");
                }
              });
              actionWrap.appendChild(stopPotreeBtn);
            } else {
              potreeBtn.textContent = capture.has_potree ? "View in Potree" : "Launch Potree";
              potreeBtn.addEventListener("click", async () => {
                try {
                  potreeBtn.disabled = true;
                  potreeBtn.textContent = "Starting…";
                  const result = await postJson("/api/capture/potree/start", { capture_dir: capture.path });
                  if (result.ok) {
                    setMessage("Potree started");
                    await refreshCaptures();
                    window.open(result.url, "_blank", "noopener");
                  } else {
                    setMessage(result.message, "error");
                    potreeBtn.disabled = false;
                    potreeBtn.textContent = "View in Potree";
                  }
                } catch (error) {
                  potreeBtn.disabled = false;
                  potreeBtn.textContent = "View in Potree";
                  setMessage(error.message ?? String(error), "error");
                }
              });
              actionWrap.appendChild(potreeBtn);
            }
          }

          if (capture.log_path) {
            const logBtn = document.createElement("button");
            logBtn.textContent = "View log";
            logBtn.addEventListener("click", () => {
              window.open(`/api/capture/log?capture_dir=${encodeURIComponent(capture.path)}`, "_blank", "noopener");
            });
            actionWrap.appendChild(logBtn);
          }

          const renameBtn = document.createElement("button");
          renameBtn.textContent = "Rename";
          renameBtn.style.cssText = "background:#263345;color:white;";
          renameBtn.addEventListener("click", async () => {
            const newName = prompt(`Rename "${capture.name}" to:`, capture.name);
            if (!newName || newName === capture.name) return;
            try {
              const result = await postJson("/api/capture/rename", { capture_dir: capture.path, new_name: newName });
              setMessage(result.message);
              await refreshCaptures();
            } catch (error) {
              setMessage(error.message ?? String(error), "error");
            }
          });
          actionWrap.appendChild(renameBtn);

          const deleteBtn = document.createElement("button");
          deleteBtn.textContent = "Delete";
          deleteBtn.style.cssText = "background:#5a2020;color:#ffccd2;";
          deleteBtn.addEventListener("click", async () => {
            if (!confirm(`Delete session "${capture.name}"? This cannot be undone.`)) return;
            try {
              const result = await postJson("/api/capture/delete", { capture_dir: capture.path });
              setMessage(result.message);
              if (selectedCapturePath === capture.path) {
                selectedCapturePath = null;
                processedViewBtn.disabled = true;
                setViewerMode("live");
              }
              await refreshCaptures();
            } catch (error) {
              setMessage(error.message ?? String(error), "error");
            }
          });
          actionWrap.appendChild(deleteBtn);

          head.appendChild(actionWrap);

          card.appendChild(head);

          const meta = document.createElement("div");
          meta.className = "capture-meta";
          const duration = capture.duration_seconds ? `${capture.duration_seconds.toFixed(1)} s` : "unknown duration";
          const processed = capture.processed_mesh ? (capture.colored_mesh ? "colored" : "geometry only") : "none";
          meta.textContent =
            `${duration} • ${formatBytes(capture.bag_size_bytes)} • messages: ${capture.message_count} ` +
            `(LiDAR ${capture.lidar_messages}, IMU ${capture.imu_messages}) • mesh: ${processed}`;
          card.appendChild(meta);

          if (!capture.processable && capture.process_blocker) {
            const note = document.createElement("div");
            note.className = "capture-note";
            note.textContent = `Not processable: ${capture.process_blocker}`;
            card.appendChild(note);
          }

          if (payload.processing.capture_dir === capture.path) {
            const note = document.createElement("div");
            note.className = "capture-note";
            note.textContent = `Processing: ${payload.processing.status}${payload.processing.message ? ` — ${payload.processing.message}` : ""}`;
            card.appendChild(note);
          }

          if (payload.colorize && payload.colorize.capture_dir === capture.path && payload.colorize.status !== "idle") {
            const note = document.createElement("div");
            note.className = "capture-note";
            note.style.color = payload.colorize.status === "failed" ? "#ff8888" : "#7fffd4";
            note.textContent = `Colorize: ${payload.colorize.status}${payload.colorize.message ? ` — ${payload.colorize.message}` : ""}`;
            card.appendChild(note);
          }

          capturesEl.appendChild(card);
        }
      }

      async function runAction(action) {
        try {
          await action();
        } catch (error) {
          setMessage(error.message ?? String(error), "error");
        }
      }

      startBtn.addEventListener("click", async () => runAction(async () => {
        livePreviewFitted = false;
        const sessionNameEl = document.getElementById("sessionNameInput");
        const sessionName = sessionNameEl.value.trim() || null;
        const result = await postJson("/api/scan/start", sessionName ? { session_name: sessionName } : {});
        setMessage(result.message);
        sessionNameEl.value = "";
        await refreshStatus();
        await refreshCaptures();
      }));

      stopBtn.addEventListener("click", async () => runAction(async () => {
        const result = await postJson("/api/scan/stop");
        setMessage(result.message);
        await refreshStatus();
        await refreshCaptures();
      }));

      liveViewBtn.addEventListener("click", () => {
        livePreviewFitted = false;
        setViewerMode("live");
        refreshPreview().catch((error) => setMessage(error.message ?? String(error), "error"));
      });

      processedViewBtn.addEventListener("click", async () => {
        if (!selectedCapturePath || !latestCapturesPayload) return;
        const capture = latestCapturesPayload.captures.find((item) => item.path === selectedCapturePath);
        if (!capture) return;
        await runAction(async () => loadProcessedMesh(capture));
      });

      setInterval(() => { refreshStatus().catch((error) => setMessage(error.message ?? String(error), "error")); }, 1000);
      setInterval(() => { refreshPreview().catch((error) => setMessage(error.message ?? String(error), "error")); }, 1500);
      setInterval(() => { refreshCamera().catch((error) => setMessage(error.message ?? String(error), "error")); }, 750);
      setInterval(() => { refreshCaptures().catch((error) => setMessage(error.message ?? String(error), "error")); }, 5000);

      function animate() {
        requestAnimationFrame(animate);
        resizeRenderer();
        controls.update();
        renderer.render(scene, camera);
      }

      setViewerMode("live");
      refreshStatus().catch((error) => setMessage(error.message ?? String(error), "error"));
      refreshPreview().catch((error) => setMessage(error.message ?? String(error), "error"));
      refreshCamera().catch((error) => setMessage(error.message ?? String(error), "error"));
      refreshCaptures().catch((error) => setMessage(error.message ?? String(error), "error"));
      animate();
    </script>
  </body>
</html>
