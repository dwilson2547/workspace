/**:
  ros__parameters:
    cloud_topic: "/cloud_registered"   # Point-LIO's registered output
    odom_topic: "/aft_mapped_to_init"  # Verified against the vendored Point-LIO fork
    map_frame: "camera_init"           # Default Point-LIO odom_header_frame_id
    voxel_size: 0.02                   # 2 cm -- print-grade-ish; raise for speed
    sdf_trunc: 0.08                    # truncation distance (~4x voxel)
    space_carving: true
    mesh_every_n_clouds: 20            # don't mesh every frame; it's expensive
    min_weight: 2.0                    # min TSDF weight before a voxel is meshed
    mesh_topic: "/scanner/mesh"        # visualization_msgs/Marker (TRIANGLE_LIST)
    publish_mesh: true
    save_on_shutdown: true
    save_path: "sessions/mesh_live.ply"
