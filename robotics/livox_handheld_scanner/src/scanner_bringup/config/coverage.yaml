/**:
  ros__parameters:
    cloud_topic: "/cloud_registered"
    odom_topic: "/aft_mapped_to_init"
    map_frame: "camera_init"           # Default Point-LIO odom_header_frame_id
    voxel_size: 0.10                   # 10 cm coverage cells
    observations_for_full: 8           # hits before a cell is "well covered"
    heatmap_topic: "/scanner/coverage" # PointCloud2 with intensity = obs count
    publish_rate_hz: 5.0
    # Point-LIO does not expose a native health score yet, so this stays on the
    # odom-covariance fallback until the fork grows a real diagnostic output.
    health_topic: "/scanner/health"
    odom_cov_trace_warn: 0.05
