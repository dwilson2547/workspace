services:
  searxng:
    image: searxng/searxng:latest
    container_name: searxng
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./searxng:/etc/searxng:rw
    environment:
      - SEARXNG_BASE_URL=http://localhost:8080/
      - UWSGI_WORKERS=2
      - UWSGI_THREADS=4
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    networks:
      - searxng_net

networks:
  searxng_net:
    driver: bridge
