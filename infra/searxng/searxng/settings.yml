# SearXNG configuration
# Docs: https://docs.searxng.org/admin/settings.html

use_default_settings: true

server:
  # Ensure this matches SEARXNG_BASE_URL
  base_url: http://localhost:8080/
  bind_address: 0.0.0.0
  port: 8080
  secret_key: "change-me-to-a-random-string"
  # Explicitly disable limiter/botdetection for local-only usage
  limiter: false
  public_instance: false
  # Allow GET queries for simple API calls
  method: "GET"

# Allow local clients (including MCP server) to call the API
ui:
  static_use_hash: true

search:
  safe_search: 0
  # Allow API output formats
  formats:
    - html
    - json

# Disable bot detection for local-only usage to avoid 403s
botdetection:
  enabled: false

# Enable JSON output for programmatic queries
# Example: http://localhost:8080/search?q=test&format=json

# Public instance limits can stay default for local usage

# Optional: add rate limiting if you expose beyond localhost
# limiter:
#   enabled: true
#   real_ip:
#     x_for: 1
#     ipv4_prefix: 32
#     ipv6_prefix: 128
